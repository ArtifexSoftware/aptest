# Run aptest.py on Github. Instead of
# specifying individual inputs, we support a single string input which is used
# for the command line directly.
#
# This ensures we behave exactly like scripts/test.py, without confusion caused
# by having to translate between differing APIs.

name: test_multiple

on:
  schedule:
    - cron: '47 2 * * *'
  workflow_dispatch:
    inputs:
      args:
        type: string
        default: ''
        description: 'Arguments to pass to aptest.py'

jobs:

  test:
    name: test_multiple
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [
                ubuntu-latest,
                windows-2022,
                macos-14,
                macos-15-intel,
                ]
        
        args: [
            '-m "git:-b 1.27.x" -p git: --pro git: --layout git: --4llm git:',
            '-m git:            -p git: --pro git: --layout git: --4llm git:',
            '-p pip: --pro git: --smartoffice git: -t -pymupdf',
            ]

      # Avoid cancelling of all runs after a single failure.
      fail-fast: false

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: test_multiple
        env:
          APTEST_args: ${{inputs.args}}
          APTEST_matrix_args: ${{ matrix.args }}
          ARTIFEX_SOFTWARE_SSH_KEY: ${{secrets.ARTIFEX_SOFTWARE_SSH_KEY}}
          PYMUPDFPRO_SETUP_SOT_KEY: ${{secrets.PYMUPDFPRO_SETUP_SOT_KEY}}
        run: |
          # Set APTEST_matrix_args2 to APTEST_matrix_args with modifications to
          # allows use as artifact name.
          python3 -c 'import os, re; APTEST_matrix_args=os.environ["APTEST_matrix_args"]; APTEST_matrix_args2 = re.sub("[: \"]", "_", APTEST_matrix_args); print(f"APTEST_matrix_args2="+APTEST_matrix_args2)' >> $GITHUB_ENV
          # Run tests.
          python aptest.py ${{matrix.args}} build test -a APTEST_args
      
      # Upload generated wheels, to be accessible from github Actions page.
      #
      # This doesn't work:
      #
      #     Error: The artifact name is not valid: artifact-ubuntu-latest--m
      #     git: -p git: --pro git: --layout git:. Contains the following
      #     character:  Colon :
      #
      #     Invalid characters include:  Double quote ", Colon :, Less than
      #     <, Greater than >, Vertical bar |, Asterisk *, Question mark ?,
      #     Carriage return \r, Line feed \n, Backslash \, Forward slash /
      #
      #     These characters are not allowed in the artifact name due to
      #     limitations with certain file systems such as NTFS. To maintain
      #     file system agnostic behavior, these characters are intentionally
      #     not allowed to prevent potential problems with downloads on
      #     different file systems.
      #
      #- uses: actions/upload-artifact@v4
      #  with:
      #    path: |
      #        aptest-wheelhouse/*.whl
      #        aptest-wheelhouse/*.tar.gz
      #    name: artifact-${{ matrix.os }}-${{ matrix.args }}
      #
      # Se we use APTEST_matrix_args2 as calculated earlier.
      #
      - uses: actions/upload-artifact@v4
        with:
          path: |
              aptest-wheelhouse/*.whl
              #aptest-wheelhouse/*.tar.gz
          name: artifact-${{ matrix.os }}-${{ env.APTEST_matrix_args2 }}
