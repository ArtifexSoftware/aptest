# Run aptest.py on Github. Instead of
# specifying individual inputs, we support a single string input which is used
# for the command line directly.
#
# This ensures we behave exactly like scripts/test.py, without confusion caused
# by having to translate between differing APIs.

name: Tests

on:
  #schedule:
  #  - cron: '47 2 * * *'
  #pull_request:
  #  branches: [main]
  workflow_dispatch:
    inputs:
      args:
        type: string
        default: ''
        description: 'Arguments to pass to scripts/test.py'
      matrix:
        type: string
jobs:

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      
      matrix: ${{ fromJson(inputs.matrix) }}

      # Avoid cancelling of all runs after a single failure.
      fail-fast: false

    steps:

      - uses: actions/checkout@v4
        with:
          # Checkout into aptest/.git/ etc instead of ./.git/ so that we are
          # above the aptest checkout and invoke Aptest with `aptest/aptest.py
          # ...` instead of `./aptest.py`.
          #
          # Otherwise pytest will pick up aptest's pytest.ini file if a package
          # does not define one itself.
          path: aptest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Required for graal builds.

      - uses: actions/setup-python@v5
        #with:
        #  python-version: '3.12'

      # https://github.com/pypa/cibuildwheel/issues/2114
      # https://cibuildwheel.pypa.io/en/stable/faq/#emulation
      #
      - name: Set up QEMU
        if: runner.os == 'Linux' && runner.arch == 'X64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      
      - name: test
        env:
          APTEST_args: ${{inputs.args}}
          ARTIFEX_SOFTWARE_SSH_KEY: ${{secrets.ARTIFEX_SOFTWARE_SSH_KEY}}
          PYMUPDFPRO_SETUP_SOT_KEY: ${{secrets.PYMUPDFPRO_SETUP_SOT_KEY}}
        run:
          python aptest/aptest.py -a APTEST_args
      
      # Upload generated wheels, to be accessible from github Actions page.
      #
      - uses: actions/upload-artifact@v4
        with:
          path: |
              aptest-wheelhouse/*.whl
              aptest-wheelhouse/*.tar.gz
              aptest-wheelhouse/*.xml
          name: artifact-${{ matrix.os }}
